<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hitokoto - 一言</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      width: 100%;
      text-align: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 40px;
      margin: 20px 0;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    .hitokoto-text {
      font-size: 1.5em;
      line-height: 1.8;
      margin-bottom: 20px;
      min-height: 60px;
    }
    .hitokoto-from {
      font-size: 1em;
      opacity: 0.8;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 20px 0;
    }
    select, input, button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      outline: none;
    }
    select option { color: #333; }
    button {
      background: rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: background 0.2s;
      font-weight: 600;
    }
    button:hover { background: rgba(255, 255, 255, 0.5); }
    .api-info {
      margin-top: 30px;
      font-size: 0.85em;
      opacity: 0.7;
    }
    .api-info a { color: #fff; text-decoration: underline; }
    .loading { opacity: 0.5; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✨ 一言</h1>
    <p>用代码表达言语的魅力</p>
    <div class="card">
      <div class="hitokoto-text" id="hitokoto">加载中...</div>
      <div class="hitokoto-from" id="from"></div>
    </div>
    <div class="controls">
      <select id="category">
        <option value="">随机分类</option>
        <option value="a">动画</option>
        <option value="b">漫画</option>
        <option value="c">游戏</option>
        <option value="d">文学</option>
        <option value="e">原创</option>
        <option value="f">来自网络</option>
        <option value="g">其他</option>
        <option value="h">影视</option>
        <option value="i">诗词</option>
        <option value="j">网易云</option>
        <option value="k">哲学</option>
        <option value="l">抖机灵</option>
      </select>
      <input type="number" id="maxLength" placeholder="最大长度" min="0" max="1000">
      <input type="number" id="minLength" placeholder="最小长度" min="0">
      <button onclick="fetchHitokoto()">刷新</button>
    </div>
    <div class="api-info">
      <p>API: <code>/api/hitokoto</code></p>
      <p>参数: c(分类), max_length, min_length, encode(json|js|text), select(CSS选择器)</p>
    </div>
  </div>

  <script>
    async function fetchHitokoto() {
      const el = document.getElementById('hitokoto');
      const fromEl = document.getElementById('from');
      el.className = 'hitokoto-text loading';
      el.textContent = '加载中...';

      const params = new URLSearchParams();
      const category = document.getElementById('category').value;
      const maxLength = document.getElementById('maxLength').value;
      const minLength = document.getElementById('minLength').value;
      if (category) params.set('c', category);
      if (maxLength) params.set('max_length', maxLength);
      if (minLength) params.set('min_length', minLength);

      try {
        const res = await fetch('/api/hitokoto?' + params.toString());
        const data = await res.json();
        el.textContent = data.hitokoto;
        fromEl.textContent = data.from ? `—— ${data.from}${data.from_who ? ' · ' + data.from_who : ''}` : '';
        el.className = 'hitokoto-text';
      } catch (err) {
        el.textContent = '获取失败，请重试';
        el.className = 'hitokoto-text';
      }
    }

    fetchHitokoto();
  </script>
</body>
</html>
